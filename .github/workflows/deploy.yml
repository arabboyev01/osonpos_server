name: Deploy OsonPOS Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/osonpos_server/
            git pull origin main
            
            # Install all dependencies (including devDeps like ts-node)
            npm install
            
            # Generate Prisma Client
            npx prisma generate
            
            # Build the application
            npm run build
            
            # Apply migrations to Admin DB
            export DATABASE_URL=${{ secrets.DATABASE_URL }}
            npx prisma db push --accept-data-loss
            
            # Migrate all tenants
            # Using npx ensures ts-node is found in local node_modules
            npx ts-node scripts/migrate-tenants.ts
            
            # Restart Application
            # If pm2 is global, we try to find it via common paths; 
            # otherwise npx pm2 works if pm2 is in package.json
            export PATH=$PATH:~/.nvm/versions/node/$(node -v)/bin:/usr/local/bin
            pm2 reload ecosystem.config.js --env production || npx pm2 reload ecosystem.config.js --env production
